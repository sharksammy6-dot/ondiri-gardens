<!DOCTYPE html>
<html>

<head>

    <title>Ondiri Gardens Gallery</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#e8f5e9;
            margin:20px;
        }


        h1{
            color:#2e7d32;
            text-align:center;
        }


        .top{
            text-align:center;
            margin-bottom:20px;
        }


        .button{
            background:#2e7d32;
            color:white;
            padding:10px 20px;
            text-decoration:none;
            border-radius:5px;
        }


        .gallery{

            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;

        }


        .card{

            background:white;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.15);
            padding:10px;
            text-align:center;
            overflow:hidden;

        }


        .card img{

            width:100%;
            height:300px;
            object-fit:contain;
            background:#f5f5f5;
            border-radius:8px;
            cursor:pointer;

        }


        .delete{

            display:inline-block;
            margin-top:10px;
            background:#dc3545;
            color:white;
            padding:8px 15px;
            text-decoration:none;
            border-radius:5px;

        }



        /* LIGHTBOX */

        #lightbox{

            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.9);
            justify-content:center;
            align-items:center;
            z-index:9999;

        }



        #lightbox img{

            width:auto;
            height:90vh;
            max-width:90%;
            object-fit:contain;
            border-radius:10px;
            box-shadow:0 0 30px white;

        }


    </style>


</head>



<body>


<h1>🌿 Ondiri Gardens Gallery</h1>



<div class="top">

    <a class="button" href="/admin">
        ⬅ Back to Admin
    </a>

</div>




<div class="gallery">


{% for image in images %}


<div class="card">


<img 
src="{{ url_for('static', filename='uploads/' + image[1]) }}"
alt="Ondiri Gardens Image"
onclick="openImage(this.src)"
>



<a 
class="delete"
href="/delete_image/{{ image[0] }}"
onclick="return confirm('Are you sure you want to delete this image?')">

🗑 Delete

</a>



</div>


{% endfor %}



</div>






<!-- IMAGE POPUP -->


<div id="lightbox" onclick="closeImage()">


<img id="lightbox-img">


</div>






<script>


function openImage(src){

    document.getElementById("lightbox").style.display="flex";

    document.getElementById("lightbox-img").src=src;

}



function closeImage(){

    document.getElementById("lightbox").style.display="none";

}



</script>



</body>

</html>
